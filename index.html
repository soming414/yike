<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="真诚交友会员展示系统 - 为您寻找合适的伴侣">
    
    <!-- 微信分享优化 -->
    <meta property="og:title" content="亦可交友平台 - 会员展示系统">
    <meta property="og:description" content="真诚交友会员展示系统，为您寻找合适的伴侣。男女会员分开展示，点击卡片查看详细信息。">
    <meta property="og:image" content="https://images.unsplash.com/photo-1518568814500-bf0f8d125f46?w=1200&h=630&fit=crop">
    <meta property="og:url" content="https://your-site.edgeone-pages.com/index.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="亦可交友平台">
    
    <!-- 微信专用 -->
    <meta property="wechat:title" content="亦可交友平台 - 会员展示系统">
    <meta property="wechat:description" content="真诚交友会员展示系统，为您寻找合适的伴侣。">
    <meta property="wechat:image" content="https://images.unsplash.com/photo-1518568814500-bf0f8d125f46?w=400&h=400&fit=crop">
    
    <title>亦可交友平台 - 会员展示系统</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-heart"></i>
                <h1>亦可交友平台</h1>
                <span class="subtitle">会员展示系统</span>
            </div>
            <div class="nav-tabs">
                <button class="tab-btn active" data-gender="all">
                    <i class="fas fa-users"></i> 全部会员
                </button>
                <button class="tab-btn" data-gender="male">
                    <i class="fas fa-mars"></i> 男生专区
                </button>
                <button class="tab-btn" data-gender="female">
                    <i class="fas fa-venus"></i> 女生专区
                </button>
            </div>
            <div class="header-actions">
                <a href="admin.html" class="admin-btn">
                    <i class="fas fa-cog"></i> 后台管理
                </a>
            </div>
        </header>

        <!-- 温馨提示横幅 -->
        <div class="banner">
            <div class="banner-content">
                <i class="fas fa-exclamation-circle"></i>
                <div class="banner-text">
                    <p><strong>温馨提示：</strong>本资料仅用于真诚交友，不涉及隐私与敏感内容。遇到喜欢的人会帮忙牵线搭桥，脱单记得来报喜～</p>
                    <p class="warning"><i class="fas fa-shield-alt"></i> <strong>⚠️ 重要提醒：</strong>未见面前，切勿发生任何金钱往来！</p>
                </div>
            </div>
        </div>

        <!-- 会员卡片列表 -->
        <main class="main-content">
            <div class="cards-grid" id="membersContainer">
                <!-- 会员卡片将通过JavaScript动态加载 -->
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>正在加载会员信息...</p>
                </div>
            </div>
        </main>

        <!-- 页脚 -->
        <footer class="footer">
            <p>© 2025 真诚交友会员展示系统 | 本平台仅提供信息展示服务</p>
            <p class="footer-links">
                <a href="#"><i class="fas fa-question-circle"></i> 使用说明</a>
                <a href="#"><i class="fas fa-shield-alt"></i> 安全提示</a>
                <a href="#"><i class="fas fa-phone-alt"></i> 联系我们</a>
            </p>
        </footer>
    </div>

    <!-- 会员详情模态框 -->
    <div class="modal-overlay" id="memberModal">
        <div class="modal-content">
            <button class="modal-close" id="closeModal">
                <i class="fas fa-times"></i>
            </button>
            <div class="modal-body" id="modalBody">
                <!-- 详情内容将通过JavaScript动态加载 -->
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
